<!DOCTYPE html>
<html>
<head>

<title>Week 1 Mission</title>

<link rel="stylesheet" href="starstyles.css">

<script>
window.MathJax = {
    tex: {
        inlineMath: [['$', '$']]
    }
};
</script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<script src="js/quiz.js"></script>

</head>

<body>

<div class="slide-container">

    <!-- Slide 1 -->

    <section class="slide">

        <div class="problem-box"
             data-answer="7">

            <h2>🛰️ Problem 1</h2>

            <p>
                The spaceship collected
                $3$ energy crystals and then
                found $4$ more.

                How many crystals total?
            </p>

            <div class="answer-row">
                <input class="answer">

                <button
                    onclick="checkAnswer(this)">
                    Check
                </button>

                <div class="result"></div>
            </div>

        </div>

    </section>

    <!-- Slide 2 -->

    <section class="slide">

        <div class="problem-box"
             data-answer="25">

            <h2>🌌 Problem 2</h2>

            <p>
                Compute

                $$5^2$$
            </p>

            <div class="answer-row">

                <input class="answer">

                <button
                    onclick="checkAnswer(this)">
                    Check
                </button>

                <div class="result"></div>

            </div>

        </div>

    </section>

    <!-- Slide 3 -->

    <section class="slide">

        <div class="problem-box"
             data-answer="4">

            <h2>🚀 Problem 3</h2>

            <p>
                Solve

                $$x + 3 = 7$$
            </p>

            <div class="answer-row">

                <input class="answer">

                <button
                    onclick="checkAnswer(this)">
                    Check
                </button>

                <div class="result"></div>

            </div>

        </div>

    </section>

</div>

</body>
</html>
