<body>
    <!-- Monochrome Star/Hyperspace Background Canvas -->

    </main>

    <!-- Starfield/Hyperspace Animation Script -->
    <script>
        const canvas = document.getElementById("hyperspace-canvas");
        if (canvas) {
            const ctx = canvas.getContext("2d");
            let stars = [];
            const numStars = 150;
            const maxZ = 1000;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            window.addEventListener("resize", resize);
            resize();

            // Initialize stars
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: (Math.random() - 0.5) * 1000,
                    y: (Math.random() - 0.5) * 1000,
                    z: Math.random() * maxZ
                });
            }

            function animate() {
                requestAnimationFrame(animate);

                const w = canvas.width;
                const h = canvas.height;
                const cx = w / 2;
                const cy = h / 2;

                // Monochrome fading trail background
                ctx.fillStyle = "rgba(5, 5, 8, 0.25)";
                ctx.fillRect(0, 0, w, h);

                stars.forEach(star => {
                    // Constant speed forward motion
                    star.z -= 3;

                    if (star.z <= 0) {
                        star.z = maxZ;
                        star.x = (Math.random() - 0.5) * 1000;
                        star.y = (Math.random() - 0.5) * 1000;
                    }

                    const k = 120 / star.z;
                    const px = star.x * k + cx;
                    const py = star.y * k + cy;

                    if (px >= 0 && px < w && py >= 0 && py < h) {
                        const size = (1 - star.z / maxZ) * 2.5 + 0.3;
                        
                        // Drawing monochrome white stars with light tail
                        const prevK = 120 / (star.z + 3);
                        const prevPx = star.x * prevK + cx;
                        const prevPy = star.y * prevK + cy;

                        ctx.strokeStyle = "rgba(255, 255, 255, " + (1 - star.z / maxZ) * 0.5 + ")";
                        ctx.lineWidth = size * 0.7;
                        ctx.beginPath();
                        ctx.moveTo(prevPx, prevPy);
                        ctx.lineTo(px, py);
                        ctx.stroke();
                    }
                });
            }
            animate();
        }
    </script>
</body>
</html>
