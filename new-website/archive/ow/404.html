<script>
    // --- LIGHTWEIGHT BLACK HOLE ANIMATION ---
    const canvas = document.getElementById('black-hole-canvas');
    const ctx = canvas.getContext('2d');
    let width, height, particles = [];

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight * 0.6;
        particles = [];
        for(let i=0; i<150; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                r: Math.random() * 2,
                v: Math.random() * 0.5 + 0.2,
                angle: Math.random() * Math.PI * 2
            });
        }
    }

    function draw() {
        ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
        ctx.fillRect(0, 0, width, height);

        const centerX = width / 2;
        const centerY = height / 2;

        // Draw Accretion Disk Glow
        const gradient = ctx.createRadialGradient(centerX, centerY, 50, centerX, centerY, 200);
        gradient.addColorStop(0, 'rgba(0,0,0,1)');
        gradient.addColorStop(0.4, 'rgba(59, 130, 246, 0.1)');
        gradient.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);

        particles.forEach(p => {
            const dx = p.x - centerX;
            const dy = p.y - centerY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            // Orbit logic
            p.angle += p.v / (dist * 0.1);
            p.x = centerX + Math.cos(p.angle) * dist;
            p.y = centerY + Math.sin(p.angle) * dist;

            // Gravitational pull
            if(dist > 60) {
                p.x -= dx * 0.001;
                p.y -= dy * 0.001;
            } else {
                p.x = Math.random() * width;
                p.y = Math.random() * height;
            }

            ctx.fillStyle = `rgba(255, 255, 255, ${Math.min(1, 100/dist)})`;
            ctx.fillRect(p.x, p.y, p.r, p.r);
        });

        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', init);
    init();
    draw();
</script>
